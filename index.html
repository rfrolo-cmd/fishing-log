<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Fishing Log</title>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a1628;color:#e8f0fe;min-height:100vh}

/* SCREENS */
.screen{display:none}
.screen.active{display:block}

/* LOGIN */
#screen-login{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 24px;background:radial-gradient(ellipse at 50% 30%,#0d2a50,#0a1628)}
.login-icon{font-size:64px;margin-bottom:16px}
.login-title{font-size:36px;font-weight:700;color:#4fc3f7;margin-bottom:8px;letter-spacing:2px}
.login-sub{font-size:12px;color:#4a6b8a;letter-spacing:4px;text-transform:uppercase;margin-bottom:48px}
#btn-signin{display:flex;align-items:center;gap:12px;background:#4fc3f7;color:#0a1628;border:none;padding:14px 24px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer}

/* HEADER */
.header{background:#0f1f3d;border-bottom:1px solid rgba(79,195,247,0.15);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.header-title{font-size:20px;font-weight:700;color:#4fc3f7}
.avatar{width:32px;height:32px;border-radius:50%;border:2px solid #4fc3f7;cursor:pointer;object-fit:cover}

/* TABS */
.tabs{display:flex;background:#0f1f3d;border-bottom:1px solid rgba(79,195,247,0.15)}
.tab{flex:1;padding:12px 0;text-align:center;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:#4a6b8a;cursor:pointer;border:none;background:none}
.tab.active{color:#4fc3f7;border-bottom:2px solid #4fc3f7}

/* CONTENT */
.tab-content{display:none;padding:16px;padding-bottom:80px}
.tab-content.active{display:block}

/* FAB */
.fab{position:fixed;bottom:24px;right:20px;width:56px;height:56px;border-radius:50%;background:#00e5a0;border:none;color:#0a1628;font-size:28px;font-weight:300;cursor:pointer;box-shadow:0 4px 20px rgba(0,229,160,0.4);z-index:40;display:flex;align-items:center;justify-content:center}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;align-items:flex-end}
.modal-bg.open{display:flex}
.modal{background:#0f1f3d;border-radius:20px 20px 0 0;width:100%;max-height:90vh;overflow-y:auto;padding:16px 16px 40px;border-top:1px solid rgba(79,195,247,0.2)}
.modal-bar{width:36px;height:4px;background:#4a6b8a;border-radius:2px;margin:0 auto 16px}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-title{font-size:22px;font-weight:700;color:#4fc3f7}
.modal-close{background:none;border:none;color:#4a6b8a;font-size:22px;cursor:pointer;padding:4px}

/* FORM */
.field{margin-bottom:14px}
.label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;color:#8aabcf;margin-bottom:6px}
.input{width:100%;background:#162647;border:1px solid rgba(79,195,247,0.15);border-radius:8px;color:#e8f0fe;font-size:16px;padding:12px 14px;outline:none;-webkit-appearance:none;appearance:none}
.input:focus{border-color:#4fc3f7}
select.input{cursor:pointer}
textarea.input{resize:none;min-height:72px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* PHOTOS */
.photos{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:6px}
.photo-slot{aspect-ratio:1;background:#162647;border:1px dashed rgba(79,195,247,0.2);border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;font-size:10px;color:#4a6b8a;gap:4px;cursor:pointer}
.photo-slot img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.photo-slot input{position:absolute;inset:0;opacity:0;cursor:pointer;font-size:0}

/* WEATHER */
.weather-box{background:#162647;border:1px solid rgba(79,195,247,0.15);border-radius:8px;padding:10px 12px;display:flex;flex-wrap:wrap;gap:12px;font-size:13px;margin-top:6px}
.w-item{color:#8aabcf}
.w-item span{color:#e8f0fe;font-weight:500}

/* BUTTONS */
.btn{width:100%;padding:14px;border-radius:10px;border:none;font-size:15px;font-weight:700;cursor:pointer}
.btn-primary{background:#4fc3f7;color:#0a1628}
.btn-primary:disabled{opacity:0.5}
.btn-sm{background:#1a2f52;color:#e8f0fe;padding:10px;font-size:13px}

/* CATCH CARD */
.catch-card{background:#1a2f52;border:1px solid rgba(79,195,247,0.15);border-radius:12px;margin-bottom:10px;overflow:hidden;cursor:pointer}
.catch-imgs{display:flex;gap:2px}
.catch-imgs img{flex:1;height:80px;object-fit:cover}
.catch-body{padding:12px}
.catch-name{font-size:18px;font-weight:700}
.catch-revir{font-size:12px;color:#4a6b8a;margin-top:2px}
.catch-row{display:flex;justify-content:space-between;align-items:flex-start}
.catch-date{font-size:11px;color:#4a6b8a;text-align:right}
.tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.tag{background:#162647;border:1px solid rgba(79,195,247,0.15);border-radius:20px;padding:3px 10px;font-size:11px;color:#8aabcf}
.tag.blue{border-color:#4fc3f7;color:#4fc3f7}
.tag.green{border-color:#00e5a0;color:#00e5a0}

/* REVIR CARD */
.revir-card{background:#1a2f52;border:1px solid rgba(79,195,247,0.15);border-radius:12px;padding:14px;margin-bottom:10px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.revir-name{font-size:17px;font-weight:700}
.revir-count{font-size:12px;color:#4a6b8a;margin-top:2px}

/* STATS */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.stat-box{background:#1a2f52;border:1px solid rgba(79,195,247,0.15);border-radius:12px;padding:14px;text-align:center}
.stat-val{font-size:30px;font-weight:700;color:#4fc3f7}
.stat-lbl{font-size:10px;color:#4a6b8a;text-transform:uppercase;letter-spacing:0.5px;margin-top:2px}
.bar-row{display:flex;align-items:center;gap:10px;background:#1a2f52;border:1px solid rgba(79,195,247,0.15);border-radius:8px;padding:10px 12px;margin-bottom:6px}
.bar-label{font-size:12px;min-width:90px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-wrap{flex:1;height:4px;background:#162647;border-radius:2px}
.bar-fill{height:100%;border-radius:2px;background:#00e5a0}
.bar-n{font-size:16px;font-weight:700;color:#4fc3f7;min-width:20px;text-align:right}

/* DETAIL */
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.detail-box{background:#162647;border-radius:8px;padding:10px 12px}
.detail-lbl{font-size:10px;color:#4a6b8a;text-transform:uppercase;letter-spacing:0.5px}
.detail-val{font-size:14px;font-weight:500;margin-top:2px}
.share-url{background:#162647;border:1px solid rgba(79,195,247,0.15);border-radius:8px;padding:10px;font-size:11px;color:#4fc3f7;word-break:break-all;margin-bottom:8px}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:#4a6b8a;font-size:14px}
.empty-icon{font-size:48px;margin-bottom:12px}

/* TOAST */
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(10px);background:#00e5a0;color:#0a1628;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:700;opacity:0;transition:all 0.3s;z-index:999;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* LOADER */
#loader{display:none;position:fixed;inset:0;background:rgba(10,22,40,0.9);z-index:999;align-items:center;justify-content:center;flex-direction:column;gap:12px}
#loader.show{display:flex}
.spin{width:36px;height:36px;border:3px solid rgba(79,195,247,0.2);border-top-color:#4fc3f7;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="loader"><div class="spin"></div><div style="font-size:13px;color:#8aabcf">Načítavam...</div></div>
<div id="toast"></div>

<!-- LOGIN -->
<div id="screen-login" class="screen active">
  <div class="login-icon">🎣</div>
  <div class="login-title">FISHING LOG</div>
  <div class="login-sub">Tvoj rybársky denník</div>
  <button id="btn-signin">
    <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
    Prihlásiť sa cez Google
  </button>
</div>

<!-- APP -->
<div id="screen-app" class="screen">
  <div class="header">
    <div class="header-title">🎣 Fishing Log</div>
    <img id="avatar" class="avatar" src="" alt="" onclick="signOut()"/>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="showTab('historia',this)">História</button>
    <button class="tab" onclick="showTab('reviry',this)">Revíry</button>
    <button class="tab" onclick="showTab('statistiky',this)">Štatistiky</button>
  </div>

  <div id="tab-historia" class="tab-content active">
    <div id="list-historia"></div>
  </div>
  <div id="tab-reviry" class="tab-content">
    <div id="list-reviry"></div>
  </div>
  <div id="tab-statistiky" class="tab-content">
    <div id="list-statistiky"></div>
  </div>

  <button class="fab" onclick="openAdd()">+</button>
</div>

<!-- MODAL: NOVÝ ÚLOVOK -->
<div class="modal-bg" id="modal-add">
  <div class="modal">
    <div class="modal-bar"></div>
    <div class="modal-header">
      <div class="modal-title">Nový úlovok</div>
      <button class="modal-close" onclick="closeModal('modal-add')">✕</button>
    </div>

    <div class="field">
      <label class="label">Druh ryby *</label>
      <select class="input" id="f-fish">
        <option value="">-- Vyber --</option>
        <option>Kapor</option><option>Šťuka</option><option>Zubáč</option>
        <option>Sumec</option><option>Boleň</option><option>Ostriež</option>
        <option>Lieň</option><option>Pleskáč</option><option>Amur</option>
        <option>Tolstolobik</option><option>Pstruh dúhový</option><option>Pstruh potočný</option>
        <option>Sivoň</option><option>Jalec</option><option>Mrena</option>
        <option>Podustva</option><option>Plotica</option><option>Karas</option><option>Iné</option>
      </select>
    </div>

    <div class="field">
      <label class="label">Typ lovu *</label>
      <select class="input" id="f-type">
        <option value="">-- Vyber --</option>
        <option>Prívlač</option><option>Kaprárčenie</option><option>Feeder</option>
        <option>Float / plavák</option><option>Mucha</option><option>Trolling</option>
        <option>Čundrárčenie</option><option>Iné</option>
      </select>
    </div>

    <div class="field">
      <label class="label">Revír *</label>
      <input class="input" id="f-revir" type="text" placeholder="napr. Lipno, Váh - Šaľa..."/>
    </div>

    <div class="row2">
      <div class="field">
        <label class="label">Dĺžka (cm)</label>
        <input class="input" id="f-length" type="number" placeholder="65"/>
      </div>
      <div class="field">
        <label class="label">Váha (kg)</label>
        <input class="input" id="f-weight" type="number" step="0.1" placeholder="4.2"/>
      </div>
    </div>

    <div class="row2">
      <div class="field">
        <label class="label">Hĺbka (m)</label>
        <input class="input" id="f-depth" type="number" step="0.5" placeholder="3.5"/>
      </div>
      <div class="field">
        <label class="label">Nástraha</label>
        <input class="input" id="f-bait" type="text" placeholder="Boilie 20mm..."/>
      </div>
    </div>

    <div class="field">
      <label class="label">Počasie (auto)</label>
      <div class="weather-box" id="weather-box">
        <div class="w-item">Načítavam GPS...</div>
      </div>
    </div>

    <div class="field">
      <label class="label">Fotky</label>
      <div class="photos">
        <div class="photo-slot" id="sl-fish"><span style="font-size:22px">🐟</span><span>Ryba</span><input type="file" accept="image/*" capture="environment" onchange="addPhoto(this,'ph-fish','sl-fish')"/></div>
        <div class="photo-slot" id="sl-bait"><span style="font-size:22px">🪱</span><span>Nástraha</span><input type="file" accept="image/*" capture="environment" onchange="addPhoto(this,'ph-bait','sl-bait')"/></div>
        <div class="photo-slot" id="sl-place"><span style="font-size:22px">🌊</span><span>Miesto</span><input type="file" accept="image/*" capture="environment" onchange="addPhoto(this,'ph-place','sl-place')"/></div>
      </div>
    </div>

    <div class="field">
      <label class="label">Komentár</label>
      <textarea class="input" id="f-comment" placeholder="Podmienky, taktika, poznámky..."></textarea>
    </div>

    <button class="btn btn-primary" id="btn-save" onclick="saveCatch()">💾 Uložiť úlovok</button>
  </div>
</div>

<!-- MODAL: DETAIL -->
<div class="modal-bg" id="modal-detail">
  <div class="modal">
    <div class="modal-bar"></div>
    <div class="modal-header">
      <div class="modal-title" id="d-title"></div>
      <button class="modal-close" onclick="closeModal('modal-detail')">✕</button>
    </div>
    <div id="d-body"></div>
  </div>
</div>

<!-- MODAL: REVÍR -->
<div class="modal-bg" id="modal-revir">
  <div class="modal">
    <div class="modal-bar"></div>
    <div class="modal-header">
      <div class="modal-title" id="r-title"></div>
      <button class="modal-close" onclick="closeModal('modal-revir')">✕</button>
    </div>
    <div id="r-body"></div>
  </div>
</div>

<script>
const CLIENT_ID='60553762326-c7rhl8d6ofq82lmnnc3i3a5c5kn03765.apps.googleusercontent.com';
const SCOPES='https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/drive.file';

let S={token:null,user:null,sheetId:null,folderId:null,catches:[],photos:{},lat:null,lng:null,weather:null};

window.onload=()=>{
  const t=localStorage.getItem('fl_t'), u=localStorage.getItem('fl_u');
  if(t&&u){S.token=t;S.user=JSON.parse(u);boot();}
};

document.getElementById('btn-signin').onclick=()=>{
  google.accounts.oauth2.initTokenClient({
    client_id:CLIENT_ID, scope:SCOPES,
    callback:async r=>{
      if(r.error){toast('Chyba prihlásenia');return;}
      S.token=r.access_token;
      const u=await fetch('https://www.googleapis.com/oauth2/v3/userinfo',{headers:{Authorization:'Bearer '+S.token}}).then(x=>x.json());
      S.user=u;
      localStorage.setItem('fl_t',S.token);
      localStorage.setItem('fl_u',JSON.stringify(u));
      boot();
    }
  }).requestAccessToken();
};

function signOut(){
  if(!confirm('Odhlásiť sa?'))return;
  localStorage.removeItem('fl_t');localStorage.removeItem('fl_u');location.reload();
}

async function boot(){
  loader(true);
  document.getElementById('screen-login').classList.remove('active');
  document.getElementById('screen-app').classList.add('active');
  document.getElementById('avatar').src=S.user.picture||'';
  try{await initDrive();await loadCatches();renderAll();}
  catch(e){console.error(e);toast('Chyba: '+e.message);}
  loader(false);
}

async function api(url,opts={}){
  const r=await fetch(url,{...opts,headers:{Authorization:'Bearer '+S.token,'Content-Type':'application/json',...(opts.headers||{})}});
  if(!r.ok){const e=await r.json();throw new Error(e.error?.message||'API error');}
  return r.json();
}

async function initDrive(){
  let q=`name='FishingLog' and mimeType='application/vnd.google-apps.folder' and trashed=false`;
  let res=await api(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&fields=files(id)`);
  if(res.files.length){S.folderId=res.files[0].id;}
  else{const f=await api('https://www.googleapis.com/drive/v3/files',{method:'POST',body:JSON.stringify({name:'FishingLog',mimeType:'application/vnd.google-apps.folder'})});S.folderId=f.id;}

  q=`name='Ulovky' and '${S.folderId}' in parents and trashed=false`;
  res=await api(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&fields=files(id)`);
  if(res.files.length){S.sheetId=res.files[0].id;}
  else{
    const s=await api('https://www.googleapis.com/drive/v3/files',{method:'POST',body:JSON.stringify({name:'Ulovky',mimeType:'application/vnd.google-apps.spreadsheet',parents:[S.folderId]})});
    S.sheetId=s.id;
    await api(`https://sheets.googleapis.com/v4/spreadsheets/${S.sheetId}/values/Hárok1!A1:U1?valueInputOption=RAW`,{method:'PUT',body:JSON.stringify({values:[['ID','Dátum','Čas','Revír','Ryba','Typ','Nástraha','Dĺžka','Váha','Hĺbka','Lat','Lng','Teplota','Tlak','Vietor','Počasie','Foto ryba','Foto nástraha','Foto miesto','Komentár','ShareID']]})});
  }
}

async function loadCatches(){
  try{
    const r=await api(`https://sheets.googleapis.com/v4/spreadsheets/${S.sheetId}/values/Hárok1!A2:U2000`);
    S.catches=(r.values||[]).map(r=>({
      id:r[0]||'',date:r[1]||'',time:r[2]||'',revir:r[3]||'',fish:r[4]||'',
      type:r[5]||'',bait:r[6]||'',length:r[7]||'',weight:r[8]||'',depth:r[9]||'',
      lat:parseFloat(r[10])||null,lng:parseFloat(r[11])||null,
      temp:r[12]||'',pressure:r[13]||'',wind:r[14]||'',wdesc:r[15]||'',
      pFish:r[16]||'',pBait:r[17]||'',pPlace:r[18]||'',
      comment:r[19]||'',shareId:r[20]||''
    })).filter(c=>c.fish);
  }catch(e){S.catches=[];}
}

function addPhoto(input,key,slotId){
  const file=input.files[0];if(!file)return;
  S.photos[key]=file;
  const slot=document.getElementById(slotId);
  const ex=slot.querySelector('img');if(ex)ex.remove();
  const img=document.createElement('img');img.src=URL.createObjectURL(file);
  slot.appendChild(img);
}

async function uploadPhoto(file,name){
  if(!file)return'';
  const form=new FormData();
  form.append('metadata',new Blob([JSON.stringify({name,parents:[S.folderId]})],{type:'application/json'}));
  form.append('file',file);
  const r=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',{method:'POST',headers:{Authorization:'Bearer '+S.token},body:form});
  const d=await r.json();
  await api(`https://www.googleapis.com/drive/v3/files/${d.id}/permissions`,{method:'POST',body:JSON.stringify({role:'reader',type:'anyone'})});
  return`https://drive.google.com/uc?id=${d.id}`;
}

async function fetchWeather(lat,lng){
  try{
    const d=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current=temperature_2m,surface_pressure,wind_speed_10m,weather_code&timezone=auto`).then(r=>r.json());
    const c=d.current;
    S.weather={temp:c.temperature_2m,pressure:Math.round(c.surface_pressure),wind:c.wind_speed_10m,desc:wCode(c.weather_code)};
    document.getElementById('weather-box').innerHTML=`
      <div class="w-item">🌡️ <span>${S.weather.temp}°C</span></div>
      <div class="w-item">🧭 <span>${S.weather.pressure} hPa</span></div>
      <div class="w-item">💨 <span>${S.weather.wind} km/h</span></div>
      <div class="w-item">☁️ <span>${S.weather.desc}</span></div>`;
  }catch(e){document.getElementById('weather-box').innerHTML='<div class="w-item">Počasie nedostupné</div>';}
}

function wCode(c){
  if(c===0)return'Jasno ☀️';if(c<=3)return'Oblačno ⛅';if(c<=48)return'Hmla 🌫️';
  if(c<=67)return'Dážď 🌧️';if(c<=77)return'Sneh ❄️';if(c<=82)return'Prehánky 🌦️';return'Búrka ⛈️';
}

async function saveCatch(){
  const fish=document.getElementById('f-fish').value;
  const revir=document.getElementById('f-revir').value;
  if(!fish||!revir){toast('Vyplň druh ryby a revír!');return;}
  const btn=document.getElementById('btn-save');
  btn.disabled=true;btn.textContent='Ukladám...';loader(true);
  try{
    const now=new Date(),id=Date.now().toString(),shareId=Math.random().toString(36).substr(2,8);
    const[pF,pB,pP]=await Promise.all([
      uploadPhoto(S.photos['ph-fish'],id+'_fish.jpg'),
      uploadPhoto(S.photos['ph-bait'],id+'_bait.jpg'),
      uploadPhoto(S.photos['ph-place'],id+'_place.jpg')
    ]);
    const w=S.weather||{};
    await api(`https://sheets.googleapis.com/v4/spreadsheets/${S.sheetId}/values/Hárok1!A:U:append?valueInputOption=RAW&insertDataOption=INSERT_ROWS`,{
      method:'POST',body:JSON.stringify({values:[[
        id,now.toLocaleDateString('sk-SK'),now.toLocaleTimeString('sk-SK',{hour:'2-digit',minute:'2-digit'}),
        revir,fish,
        document.getElementById('f-type').value,
        document.getElementById('f-bait').value,
        document.getElementById('f-length').value,
        document.getElementById('f-weight').value,
        document.getElementById('f-depth').value,
        S.lat||'',S.lng||'',w.temp||'',w.pressure||'',w.wind||'',w.desc||'',
        pF,pB,pP,
        document.getElementById('f-comment').value,
        shareId
      ]]})
    });
    await loadCatches();renderAll();
    closeModal('modal-add');toast('Úlovok uložený! 🎣');
  }catch(e){console.error(e);toast('Chyba: '+e.message);}
  finally{btn.disabled=false;btn.textContent='💾 Uložiť úlovok';loader(false);}
}

function renderAll(){renderHistoria();renderReviry();renderStats();}

function renderHistoria(){
  const el=document.getElementById('list-historia');
  if(!S.catches.length){el.innerHTML='<div class="empty"><div class="empty-icon">🎣</div>Zatiaľ žiadne úlovky.<br>Stlač + pre pridanie prvého!</div>';return;}
  el.innerHTML=S.catches.slice().reverse().map(c=>`
    <div class="catch-card" onclick="openDetail('${c.id}')">
      ${(c.pFish||c.pBait||c.pPlace)?`<div class="catch-imgs">${c.pFish?`<img src="${c.pFish}"/>`:''}${c.pBait?`<img src="${c.pBait}"/>`:''}${c.pPlace?`<img src="${c.pPlace}"/>`:''}</div>`:''}
      <div class="catch-body">
        <div class="catch-row">
          <div><div class="catch-name">${c.fish}</div><div class="catch-revir">📍 ${c.revir}</div></div>
          <div class="catch-date">${c.date}<br/>${c.time}</div>
        </div>
        <div class="tags">
          ${c.type?`<span class="tag">${c.type}</span>`:''}
          ${c.length?`<span class="tag blue">📏 ${c.length} cm</span>`:''}
          ${c.weight?`<span class="tag green">⚖️ ${c.weight} kg</span>`:''}
          ${c.bait?`<span class="tag">🪱 ${c.bait}</span>`:''}
          ${c.wdesc?`<span class="tag">${c.wdesc}</span>`:''}
        </div>
      </div>
    </div>`).join('');
}

function renderReviry(){
  const el=document.getElementById('list-reviry');
  const map={};S.catches.forEach(c=>{if(!map[c.revir])map[c.revir]=[];map[c.revir].push(c);});
  const entries=Object.entries(map).sort((a,b)=>b[1].length-a[1].length);
  if(!entries.length){el.innerHTML='<div class="empty"><div class="empty-icon">📍</div>Žiadne revíry</div>';return;}
  el.innerHTML=entries.map(([r,cs])=>`
    <div class="revir-card" onclick="openRevir('${r}')">
      <div><div class="revir-name">${r}</div><div class="revir-count">${cs.length} úlovkov</div></div>
      <span style="color:#4a6b8a">›</span>
    </div>`).join('');
}

function renderStats(){
  const el=document.getElementById('list-statistiky');
  const c=S.catches;
  if(!c.length){el.innerHTML='<div class="empty"><div class="empty-icon">📊</div>Žiadne dáta</div>';return;}
  const totalW=c.reduce((s,x)=>s+(parseFloat(x.weight)||0),0);
  const maxW=c.reduce((m,x)=>Math.max(m,parseFloat(x.weight)||0),0);
  const reviry=new Set(c.map(x=>x.revir)).size;

  const baitMap={};c.forEach(x=>{if(x.bait)baitMap[x.bait]=(baitMap[x.bait]||0)+1;});
  const baits=Object.entries(baitMap).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const maxB=baits[0]?.[1]||1;

  const fishMap={};c.forEach(x=>{if(x.fish)fishMap[x.fish]=(fishMap[x.fish]||0)+1;});
  const fishes=Object.entries(fishMap).sort((a,b)=>b[1]-a[1]);
  const maxF=fishes[0]?.[1]||1;

  el.innerHTML=`
    <div class="stat-grid">
      <div class="stat-box"><div class="stat-val">${c.length}</div><div class="stat-lbl">Úlovkov</div></div>
      <div class="stat-box"><div class="stat-val">${reviry}</div><div class="stat-lbl">Revírov</div></div>
      <div class="stat-box"><div class="stat-val">${totalW.toFixed(1)}</div><div class="stat-lbl">kg celkom</div></div>
      <div class="stat-box"><div class="stat-val">${maxW.toFixed(1)}</div><div class="stat-lbl">kg max</div></div>
    </div>
    <div style="font-size:13px;font-weight:700;color:#4fc3f7;margin:16px 0 8px;text-transform:uppercase;letter-spacing:1px">Nástrahy</div>
    ${baits.map(([b,n])=>`<div class="bar-row"><div class="bar-label">${b}</div><div class="bar-wrap"><div class="bar-fill" style="width:${(n/maxB)*100}%"></div></div><div class="bar-n">${n}</div></div>`).join('')}
    <div style="font-size:13px;font-weight:700;color:#4fc3f7;margin:16px 0 8px;text-transform:uppercase;letter-spacing:1px">Druhy rýb</div>
    ${fishes.map(([f,n])=>`<div class="bar-row"><div class="bar-label">🐟 ${f}</div><div class="bar-wrap"><div class="bar-fill" style="width:${(n/maxF)*100}%;background:#4fc3f7"></div></div><div class="bar-n">${n}</div></div>`).join('')}`;
}

function openDetail(id){
  const c=S.catches.find(x=>x.id===id);if(!c)return;
  document.getElementById('d-title').textContent=c.fish;
  const shareUrl=location.origin+location.pathname+'?share='+c.shareId;
  document.getElementById('d-body').innerHTML=`
    ${(c.pFish||c.pBait||c.pPlace)?`<div class="catch-imgs" style="border-radius:8px;overflow:hidden;margin-bottom:14px;">${c.pFish?`<img src="${c.pFish}" style="flex:1;height:130px;object-fit:cover"/>`:''}${c.pBait?`<img src="${c.pBait}" style="flex:1;height:130px;object-fit:cover"/>`:''}${c.pPlace?`<img src="${c.pPlace}" style="flex:1;height:130px;object-fit:cover"/>`:''}</div>`:''}
    <div class="detail-grid">
      <div class="detail-box"><div class="detail-lbl">Revír</div><div class="detail-val">📍 ${c.revir}</div></div>
      <div class="detail-box"><div class="detail-lbl">Dátum & čas</div><div class="detail-val">${c.date} ${c.time}</div></div>
      <div class="detail-box"><div class="detail-lbl">Typ lovu</div><div class="detail-val">${c.type||'—'}</div></div>
      <div class="detail-box"><div class="detail-lbl">Nástraha</div><div class="detail-val">${c.bait||'—'}</div></div>
      <div class="detail-box"><div class="detail-lbl">Dĺžka</div><div class="detail-val">${c.length?c.length+' cm':'—'}</div></div>
      <div class="detail-box"><div class="detail-lbl">Váha</div><div class="detail-val">${c.weight?c.weight+' kg':'—'}</div></div>
      <div class="detail-box"><div class="detail-lbl">Hĺbka</div><div class="detail-val">${c.depth?c.depth+' m':'—'}</div></div>
      <div class="detail-box"><div class="detail-lbl">Počasie</div><div class="detail-val">${c.wdesc||'—'}</div></div>
      <div class="detail-box"><div class="detail-lbl">Teplota</div><div class="detail-val">${c.temp?c.temp+'°C':'—'}</div></div>
      <div class="detail-box"><div class="detail-lbl">Tlak</div><div class="detail-val">${c.pressure?c.pressure+' hPa':'—'}</div></div>
    </div>
    ${c.comment?`<div style="background:#162647;border-radius:8px;padding:12px;margin-bottom:12px;font-size:14px;">${c.comment}</div>`:''}
    ${c.lat?`<a href="https://maps.google.com/?q=${c.lat},${c.lng}" target="_blank" style="display:block;background:#1a2f52;border:1px solid rgba(79,195,247,0.15);border-radius:10px;padding:12px;text-align:center;color:#4fc3f7;text-decoration:none;margin-bottom:10px;">🗺️ Otvoriť v Google Maps</a>`:''}
    <div class="share-url">${shareUrl}</div>
    <button class="btn btn-sm" onclick="navigator.clipboard.writeText('${shareUrl}').then(()=>toast('Link skopírovaný! 📋'))">📋 Kopírovať link</button>`;
  openModal('modal-detail');
}

function openRevir(revir){
  const cs=S.catches.filter(c=>c.revir===revir);
  document.getElementById('r-title').textContent=revir;
  const maxW=cs.reduce((m,c)=>Math.max(m,parseFloat(c.weight)||0),0);
  const baitMap={};cs.forEach(c=>{if(c.bait)baitMap[c.bait]=(baitMap[c.bait]||0)+1;});
  const baits=Object.entries(baitMap).sort((a,b)=>b[1]-a[1]);
  const maxB=baits[0]?.[1]||1;
  document.getElementById('r-body').innerHTML=`
    <div class="stat-grid" style="margin-bottom:16px">
      <div class="stat-box"><div class="stat-val">${cs.length}</div><div class="stat-lbl">Úlovkov</div></div>
      <div class="stat-box"><div class="stat-val">${maxW.toFixed(1)}</div><div class="stat-lbl">kg max</div></div>
    </div>
    ${baits.length?`<div style="font-size:13px;font-weight:700;color:#4fc3f7;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px">Nástrahy</div>${baits.map(([b,n])=>`<div class="bar-row"><div class="bar-label">${b}</div><div class="bar-wrap"><div class="bar-fill" style="width:${(n/maxB)*100}%"></div></div><div class="bar-n">${n}</div></div>`).join('')}`:''}
    <div style="font-size:13px;font-weight:700;color:#4fc3f7;margin:16px 0 8px;text-transform:uppercase;letter-spacing:1px">História</div>
    ${cs.slice().reverse().map(c=>`
      <div class="catch-card" onclick="closeModal('modal-revir');setTimeout(()=>openDetail('${c.id}'),200)">
        <div class="catch-body">
          <div class="catch-row"><div class="catch-name">${c.fish}</div><div class="catch-date">${c.date}</div></div>
          <div class="tags">
            ${c.length?`<span class="tag blue">📏 ${c.length} cm</span>`:''}
            ${c.weight?`<span class="tag green">⚖️ ${c.weight} kg</span>`:''}
            ${c.bait?`<span class="tag">🪱 ${c.bait}</span>`:''}
          </div>
        </div>
      </div>`).join('')}`;
  openModal('modal-revir');
}

function openAdd(){
  ['f-fish','f-type','f-revir','f-bait','f-length','f-weight','f-depth','f-comment'].forEach(id=>document.getElementById(id).value='');
  S.photos={};S.lat=null;S.lng=null;S.weather=null;
  ['sl-fish','sl-bait','sl-place'].forEach(id=>{const img=document.getElementById(id).querySelector('img');if(img)img.remove();});
  document.getElementById('weather-box').innerHTML='<div class="w-item">Načítavam GPS...</div>';
  openModal('modal-add');
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(pos=>{
      S.lat=pos.coords.latitude;S.lng=pos.coords.longitude;
      fetchWeather(S.lat,S.lng);
    },()=>{document.getElementById('weather-box').innerHTML='<div class="w-item">GPS nedostupná</div>';});
  }
}

function showTab(id,btn){
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  btn.classList.add('active');
}

function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.modal-bg').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');}));

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function loader(show){document.getElementById('loader').classList.toggle('show',show);}
</script>
</body>
</html>
