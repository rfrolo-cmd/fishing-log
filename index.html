<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Fishing Log</title>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a1628;color:#e8f0fe;min-height:100vh}

/* HEADER */
.header{background:#0f1f3d;border-bottom:1px solid rgba(79,195,247,0.15);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.header-title{font-size:20px;font-weight:700;color:#4fc3f7}

/* TABS */
.tabs{display:flex;background:#0f1f3d;border-bottom:1px solid rgba(79,195,247,0.15)}
.tab{flex:1;padding:13px 0;text-align:center;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:#4a6b8a;cursor:pointer;border:none;background:none;border-bottom:2px solid transparent}
.tab.active{color:#4fc3f7;border-bottom-color:#4fc3f7}

/* CONTENT */
.tab-content{display:none;padding:14px;padding-bottom:90px}
.tab-content.active{display:block}

/* FAB */
.fab{position:fixed;bottom:20px;right:20px;width:58px;height:58px;border-radius:50%;background:#00e5a0;border:none;color:#0a1628;font-size:30px;cursor:pointer;box-shadow:0 4px 20px rgba(0,229,160,0.4);z-index:40;display:flex;align-items:center;justify-content:center;font-weight:300}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;align-items:flex-end}
.modal-bg.open{display:flex}
.modal{background:#0f1f3d;border-radius:20px 20px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding:16px 16px 44px;border-top:1px solid rgba(79,195,247,0.2)}
.modal-bar{width:36px;height:4px;background:#4a6b8a;border-radius:2px;margin:0 auto 16px}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.modal-title{font-size:20px;font-weight:700;color:#4fc3f7}
.modal-x{background:none;border:none;color:#4a6b8a;font-size:22px;cursor:pointer;padding:4px 8px}

/* FORM */
.field{margin-bottom:13px}
.lbl{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;color:#8aabcf;margin-bottom:5px}
.inp{width:100%;background:#162647;border:1px solid rgba(79,195,247,0.15);border-radius:8px;color:#e8f0fe;font-size:16px;padding:12px 14px;outline:none;-webkit-appearance:none;appearance:none}
.inp:focus{border-color:#4fc3f7}
select.inp{cursor:pointer}
textarea.inp{resize:none;min-height:70px;font-family:inherit}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* PHOTOS */
.photos{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:6px}
.pslot{aspect-ratio:1;background:#162647;border:1px dashed rgba(79,195,247,0.2);border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;font-size:10px;color:#4a6b8a;gap:4px}
.pslot img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.pslot input{position:absolute;inset:0;opacity:0;cursor:pointer;font-size:0}

/* WEATHER */
.wbox{background:#162647;border:1px solid rgba(79,195,247,0.15);border-radius:8px;padding:10px 12px;display:flex;flex-wrap:wrap;gap:10px;font-size:13px;margin-top:6px}
.wi{color:#8aabcf}.wi span{color:#e8f0fe;font-weight:500}

/* BUTTONS */
.btn{width:100%;padding:14px;border-radius:10px;border:none;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px}
.btn-p{background:#4fc3f7;color:#0a1628}
.btn-p:disabled{opacity:0.5;cursor:not-allowed}
.btn-s{background:#1a2f52;color:#e8f0fe;font-size:13px;padding:11px}

/* CARDS */
.card{background:#1a2f52;border:1px solid rgba(79,195,247,0.15);border-radius:12px;margin-bottom:10px;overflow:hidden;cursor:pointer}
.card-imgs{display:flex;gap:2px}
.card-imgs img{flex:1;height:80px;object-fit:cover}
.card-body{padding:12px}
.card-name{font-size:18px;font-weight:700}
.card-revir{font-size:12px;color:#4a6b8a;margin-top:2px}
.card-row{display:flex;justify-content:space-between;align-items:flex-start}
.card-date{font-size:11px;color:#4a6b8a;text-align:right}
.tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.tag{background:#162647;border:1px solid rgba(79,195,247,0.15);border-radius:20px;padding:3px 10px;font-size:11px;color:#8aabcf}
.tag-b{border-color:#4fc3f7;color:#4fc3f7}
.tag-g{border-color:#00e5a0;color:#00e5a0}

/* REVIR */
.rcard{background:#1a2f52;border:1px solid rgba(79,195,247,0.15);border-radius:12px;padding:14px;margin-bottom:10px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.rname{font-size:17px;font-weight:700}
.rcnt{font-size:12px;color:#4a6b8a;margin-top:2px}

/* STATS */
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.sbox{background:#1a2f52;border:1px solid rgba(79,195,247,0.15);border-radius:12px;padding:14px;text-align:center}
.sval{font-size:30px;font-weight:700;color:#4fc3f7}
.slbl{font-size:10px;color:#4a6b8a;text-transform:uppercase;letter-spacing:0.5px;margin-top:2px}
.brow{display:flex;align-items:center;gap:10px;background:#1a2f52;border:1px solid rgba(79,195,247,0.15);border-radius:8px;padding:10px 12px;margin-bottom:6px}
.blbl{font-size:12px;min-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bwrap{flex:1;height:4px;background:#162647;border-radius:2px}
.bfill{height:100%;border-radius:2px;background:#00e5a0}
.bn{font-size:16px;font-weight:700;color:#4fc3f7;min-width:20px;text-align:right}

/* DETAIL */
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.dbox{background:#162647;border-radius:8px;padding:10px 12px}
.dlbl{font-size:10px;color:#4a6b8a;text-transform:uppercase;letter-spacing:0.5px}
.dval{font-size:14px;font-weight:500;margin-top:2px}
.surl{background:#162647;border:1px solid rgba(79,195,247,0.15);border-radius:8px;padding:10px;font-size:11px;color:#4fc3f7;word-break:break-all;margin-bottom:8px}

/* SECTION TITLE */
.stitle{font-size:13px;font-weight:700;color:#4fc3f7;text-transform:uppercase;letter-spacing:1px;margin:16px 0 8px}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:#4a6b8a;font-size:14px}
.eicon{font-size:48px;margin-bottom:12px}

/* TOAST */
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(10px);background:#00e5a0;color:#0a1628;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:700;opacity:0;transition:all 0.3s;z-index:999;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* LOADER */
#loader{display:none;position:fixed;inset:0;background:rgba(10,22,40,0.9);z-index:999;align-items:center;justify-content:center;flex-direction:column;gap:12px}
#loader.show{display:flex}
.spin{width:36px;height:36px;border:3px solid rgba(79,195,247,0.2);border-top-color:#4fc3f7;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="loader"><div class="spin"></div><div style="font-size:13px;color:#8aabcf">Načítavam...</div></div>
<div id="toast"></div>

<div class="header">
  <div class="header-title">🎣 Fishing Log</div>
</div>
<div class="tabs">
  <button class="tab active" onclick="showTab('historia',this)">História</button>
  <button class="tab" onclick="showTab('reviry',this)">Revíry</button>
  <button class="tab" onclick="showTab('statistiky',this)">Štatistiky</button>
</div>

<div id="tab-historia" class="tab-content active"><div id="list-historia"></div></div>
<div id="tab-reviry" class="tab-content"><div id="list-reviry"></div></div>
<div id="tab-statistiky" class="tab-content"><div id="list-statistiky"></div></div>

<button class="fab" onclick="openAdd()">+</button>

<!-- MODAL: NOVÝ ÚLOVOK -->
<div class="modal-bg" id="modal-add">
  <div class="modal">
    <div class="modal-bar"></div>
    <div class="modal-head">
      <div class="modal-title">Nový úlovok</div>
      <button class="modal-x" onclick="closeModal('modal-add')">✕</button>
    </div>

    <div class="field">
      <label class="lbl">Druh ryby *</label>
      <select class="inp" id="f-fish">
        <option value="">-- Vyber --</option>
        <option>Kapor</option><option>Šťuka</option><option>Zubáč</option>
        <option>Sumec</option><option>Boleň</option><option>Ostriež</option>
        <option>Lieň</option><option>Pleskáč</option><option>Amur</option>
        <option>Tolstolobik</option><option>Pstruh dúhový</option><option>Pstruh potočný</option>
        <option>Sivoň</option><option>Jalec</option><option>Mrena</option>
        <option>Podustva</option><option>Plotica</option><option>Karas</option><option>Iné</option>
      </select>
    </div>

    <div class="field">
      <label class="lbl">Typ lovu *</label>
      <select class="inp" id="f-type">
        <option value="">-- Vyber --</option>
        <option>Prívlač</option><option>Kaprárčenie</option><option>Feeder</option>
        <option>Float / plavák</option><option>Mucha</option><option>Trolling</option>
        <option>Čundrárčenie</option><option>Iné</option>
      </select>
    </div>

    <div class="field">
      <label class="lbl">Revír *</label>
      <input class="inp" id="f-revir" type="text" placeholder="napr. Lipno, Váh - Šaľa..."/>
    </div>

    <div class="row2">
      <div class="field">
        <label class="lbl">Dĺžka (cm)</label>
        <input class="inp" id="f-length" type="number" placeholder="65"/>
      </div>
      <div class="field">
        <label class="lbl">Váha (kg)</label>
        <input class="inp" id="f-weight" type="number" step="0.1" placeholder="4.2"/>
      </div>
    </div>

    <div class="row2">
      <div class="field">
        <label class="lbl">Hĺbka (m)</label>
        <input class="inp" id="f-depth" type="number" step="0.5" placeholder="3.5"/>
      </div>
      <div class="field">
        <label class="lbl">Nástraha</label>
        <input class="inp" id="f-bait" type="text" placeholder="Boilie 20mm..."/>
      </div>
    </div>

    <div class="field">
      <label class="lbl">Počasie (auto)</label>
      <div class="wbox" id="wbox"><div class="wi">Načítavam GPS...</div></div>
    </div>

    <div class="field">
      <label class="lbl">Fotky</label>
      <div class="photos">
        <div class="pslot" id="sl-fish"><span style="font-size:22px">🐟</span><span>Ryba</span><input type="file" accept="image/*" capture="environment" onchange="addPhoto(this,'ph-fish','sl-fish')"/></div>
        <div class="pslot" id="sl-bait"><span style="font-size:22px">🪱</span><span>Nástraha</span><input type="file" accept="image/*" capture="environment" onchange="addPhoto(this,'ph-bait','sl-bait')"/></div>
        <div class="pslot" id="sl-place"><span style="font-size:22px">🌊</span><span>Miesto</span><input type="file" accept="image/*" capture="environment" onchange="addPhoto(this,'ph-place','sl-place')"/></div>
      </div>
    </div>

    <div class="field">
      <label class="lbl">Komentár</label>
      <textarea class="inp" id="f-comment" placeholder="Podmienky, taktika, poznámky..."></textarea>
    </div>

    <button class="btn btn-p" id="btn-save" onclick="saveCatch()">💾 Uložiť úlovok</button>
  </div>
</div>

<!-- MODAL: DETAIL -->
<div class="modal-bg" id="modal-detail">
  <div class="modal">
    <div class="modal-bar"></div>
    <div class="modal-head">
      <div class="modal-title" id="d-title"></div>
      <button class="modal-x" onclick="closeModal('modal-detail')">✕</button>
    </div>
    <div id="d-body"></div>
  </div>
</div>

<!-- MODAL: REVÍR -->
<div class="modal-bg" id="modal-revir">
  <div class="modal">
    <div class="modal-bar"></div>
    <div class="modal-head">
      <div class="modal-title" id="r-title"></div>
      <button class="modal-x" onclick="closeModal('modal-revir')">✕</button>
    </div>
    <div id="r-body"></div>
  </div>
</div>

<script>
const SB_URL='https://atqtaenxzbbqvzqgyctl.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF0cXRhZW54emJicXZ6cWd5Y3RsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4OTgxNDQsImV4cCI6MjA5MzQ3NDE0NH0.hg1dc3w6orHNXYFt4y2kDFuLX0xPdNbswqIWhhFOrxs';

let catches=[], photos={}, lat=null, lng=null, weather=null;

async function sb(path, opts={}){
  const r=await fetch(SB_URL+'/rest/v1/'+path,{
    ...opts,
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation',...(opts.headers||{})}
  });
  if(!r.ok){const e=await r.text();throw new Error(e);}
  const t=await r.text();
  return t?JSON.parse(t):[];
}

async function boot(){
  loader(true);
  try{await loadCatches();renderAll();}
  catch(e){console.error(e);toast('Chyba načítania');}
  loader(false);
}

async function loadCatches(){
  catches=await sb('ulovky?select=*&order=created_at.desc');
}

function addPhoto(input,key,slotId){
  const file=input.files[0];if(!file)return;
  photos[key]=file;
  const slot=document.getElementById(slotId);
  const ex=slot.querySelector('img');if(ex)ex.remove();
  const img=document.createElement('img');img.src=URL.createObjectURL(file);
  slot.appendChild(img);
}

async function uploadPhoto(file,name){
  if(!file)return'';
  try{
    const path='photos/'+Date.now()+'_'+name;
    const r=await fetch(`${SB_URL}/storage/v1/object/fishing-photos/${path}`,{
      method:'POST',
      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':file.type},
      body:file
    });
    if(!r.ok)return'';
    return`${SB_URL}/storage/v1/object/public/fishing-photos/${path}`;
  }catch(e){return'';}
}

async function fetchWeather(la,ln){
  try{
    const d=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${la}&longitude=${ln}&current=temperature_2m,surface_pressure,wind_speed_10m,weather_code&timezone=auto`).then(r=>r.json());
    const c=d.current;
    weather={temp:c.temperature_2m,pressure:Math.round(c.surface_pressure),wind:c.wind_speed_10m,desc:wCode(c.weather_code)};
    document.getElementById('wbox').innerHTML=`
      <div class="wi">🌡️ <span>${weather.temp}°C</span></div>
      <div class="wi">🧭 <span>${weather.pressure} hPa</span></div>
      <div class="wi">💨 <span>${weather.wind} km/h</span></div>
      <div class="wi">☁️ <span>${weather.desc}</span></div>`;
  }catch(e){document.getElementById('wbox').innerHTML='<div class="wi">Počasie nedostupné</div>';}
}

function wCode(c){
  if(c===0)return'Jasno ☀️';if(c<=3)return'Oblačno ⛅';if(c<=48)return'Hmla 🌫️';
  if(c<=67)return'Dážď 🌧️';if(c<=77)return'Sneh ❄️';if(c<=82)return'Prehánky 🌦️';return'Búrka ⛈️';
}

async function saveCatch(){
  const fish=document.getElementById('f-fish').value;
  const revir=document.getElementById('f-revir').value;
  if(!fish||!revir){toast('Vyplň druh ryby a revír!');return;}
  const btn=document.getElementById('btn-save');
  btn.disabled=true;btn.textContent='Ukladám...';loader(true);
  try{
    const now=new Date();
    const id=Date.now().toString();
    const shareId=Math.random().toString(36).substr(2,8);
    const[pF,pB,pP]=await Promise.all([
      uploadPhoto(photos['ph-fish'],'fish.jpg'),
      uploadPhoto(photos['ph-bait'],'bait.jpg'),
      uploadPhoto(photos['ph-place'],'place.jpg')
    ]);
    const w=weather||{};
    await sb('ulovky',{method:'POST',body:JSON.stringify({
      id, revir, ryba:fish,
      typ:document.getElementById('f-type').value,
      nastraha:document.getElementById('f-bait').value,
      dlzka:document.getElementById('f-length').value,
      vaha:document.getElementById('f-weight').value,
      hlbka:document.getElementById('f-depth').value,
      datum:now.toLocaleDateString('sk-SK'),
      cas:now.toLocaleTimeString('sk-SK',{hour:'2-digit',minute:'2-digit'}),
      teplota:w.temp||'', tlak:w.pressure||'', vietor:w.wind||'', pocasie:w.desc||'',
      foto_ryba:pF, foto_nastraha:pB, foto_miesto:pP,
      komentar:document.getElementById('f-comment').value,
      lat:lat||null, lng:lng||null, share_id:shareId
    })});
    await loadCatches();renderAll();
    closeModal('modal-add');toast('Úlovok uložený! 🎣');
  }catch(e){console.error(e);toast('Chyba: '+e.message);}
  finally{btn.disabled=false;btn.textContent='💾 Uložiť úlovok';loader(false);}
}

function renderAll(){renderHistoria();renderReviry();renderStats();}

function renderHistoria(){
  const el=document.getElementById('list-historia');
  if(!catches.length){el.innerHTML='<div class="empty"><div class="eicon">🎣</div>Zatiaľ žiadne úlovky.<br>Stlač + pre pridanie prvého!</div>';return;}
  el.innerHTML=catches.map(c=>`
    <div class="card" onclick="openDetail('${c.id}')">
      ${(c.foto_ryba||c.foto_nastraha||c.foto_miesto)?`<div class="card-imgs">${c.foto_ryba?`<img src="${c.foto_ryba}"/>`:''}${c.foto_nastraha?`<img src="${c.foto_nastraha}"/>`:''}${c.foto_miesto?`<img src="${c.foto_miesto}"/>`:''}</div>`:''}
      <div class="card-body">
        <div class="card-row">
          <div><div class="card-name">${c.ryba}</div><div class="card-revir">📍 ${c.revir}</div></div>
          <div class="card-date">${c.datum}<br/>${c.cas}</div>
        </div>
        <div class="tags">
          ${c.typ?`<span class="tag">${c.typ}</span>`:''}
          ${c.dlzka?`<span class="tag tag-b">📏 ${c.dlzka} cm</span>`:''}
          ${c.vaha?`<span class="tag tag-g">⚖️ ${c.vaha} kg</span>`:''}
          ${c.nastraha?`<span class="tag">🪱 ${c.nastraha}</span>`:''}
          ${c.pocasie?`<span class="tag">${c.pocasie}</span>`:''}
        </div>
      </div>
    </div>`).join('');
}

function renderReviry(){
  const el=document.getElementById('list-reviry');
  const map={};catches.forEach(c=>{if(!map[c.revir])map[c.revir]=[];map[c.revir].push(c);});
  const entries=Object.entries(map).sort((a,b)=>b[1].length-a[1].length);
  if(!entries.length){el.innerHTML='<div class="empty"><div class="eicon">📍</div>Žiadne revíry</div>';return;}
  el.innerHTML=entries.map(([r,cs])=>`
    <div class="rcard" onclick="openRevir('${r}')">
      <div><div class="rname">${r}</div><div class="rcnt">${cs.length} úlovkov</div></div>
      <span style="color:#4a6b8a;font-size:20px">›</span>
    </div>`).join('');
}

function renderStats(){
  const el=document.getElementById('list-statistiky');
  if(!catches.length){el.innerHTML='<div class="empty"><div class="eicon">📊</div>Žiadne dáta</div>';return;}
  const totalW=catches.reduce((s,x)=>s+(parseFloat(x.vaha)||0),0);
  const maxW=catches.reduce((m,x)=>Math.max(m,parseFloat(x.vaha)||0),0);
  const reviry=new Set(catches.map(x=>x.revir)).size;
  const baitMap={};catches.forEach(x=>{if(x.nastraha)baitMap[x.nastraha]=(baitMap[x.nastraha]||0)+1;});
  const baits=Object.entries(baitMap).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const maxB=baits[0]?.[1]||1;
  const fishMap={};catches.forEach(x=>{if(x.ryba)fishMap[x.ryba]=(fishMap[x.ryba]||0)+1;});
  const fishes=Object.entries(fishMap).sort((a,b)=>b[1]-a[1]);
  const maxF=fishes[0]?.[1]||1;
  el.innerHTML=`
    <div class="sgrid">
      <div class="sbox"><div class="sval">${catches.length}</div><div class="slbl">Úlovkov</div></div>
      <div class="sbox"><div class="sval">${reviry}</div><div class="slbl">Revírov</div></div>
      <div class="sbox"><div class="sval">${totalW.toFixed(1)}</div><div class="slbl">kg celkom</div></div>
      <div class="sbox"><div class="sval">${maxW.toFixed(1)}</div><div class="slbl">kg max</div></div>
    </div>
    <div class="stitle">Nástrahy</div>
    ${baits.length?baits.map(([b,n])=>`<div class="brow"><div class="blbl">${b}</div><div class="bwrap"><div class="bfill" style="width:${(n/maxB)*100}%"></div></div><div class="bn">${n}</div></div>`).join(''):'<div style="color:#4a6b8a;font-size:13px">Žiadne dáta</div>'}
    <div class="stitle">Druhy rýb</div>
    ${fishes.map(([f,n])=>`<div class="brow"><div class="blbl">🐟 ${f}</div><div class="bwrap"><div class="bfill" style="width:${(n/maxF)*100}%;background:#4fc3f7"></div></div><div class="bn">${n}</div></div>`).join('')}`;
}

function openDetail(id){
  const c=catches.find(x=>x.id===id);if(!c)return;
  document.getElementById('d-title').textContent=c.ryba;
  const shareUrl=location.origin+location.pathname+'?share='+c.share_id;
  document.getElementById('d-body').innerHTML=`
    ${(c.foto_ryba||c.foto_nastraha||c.foto_miesto)?`<div class="card-imgs" style="border-radius:8px;overflow:hidden;margin-bottom:14px;">${c.foto_ryba?`<img src="${c.foto_ryba}" style="flex:1;height:130px;object-fit:cover"/>`:''}${c.foto_nastraha?`<img src="${c.foto_nastraha}" style="flex:1;height:130px;object-fit:cover"/>`:''}${c.foto_miesto?`<img src="${c.foto_miesto}" style="flex:1;height:130px;object-fit:cover"/>`:''}</div>`:''}
    <div class="dgrid">
      <div class="dbox"><div class="dlbl">Revír</div><div class="dval">📍 ${c.revir}</div></div>
      <div class="dbox"><div class="dlbl">Dátum & čas</div><div class="dval">${c.datum} ${c.cas}</div></div>
      <div class="dbox"><div class="dlbl">Typ lovu</div><div class="dval">${c.typ||'—'}</div></div>
      <div class="dbox"><div class="dlbl">Nástraha</div><div class="dval">${c.nastraha||'—'}</div></div>
      <div class="dbox"><div class="dlbl">Dĺžka</div><div class="dval">${c.dlzka?c.dlzka+' cm':'—'}</div></div>
      <div class="dbox"><div class="dlbl">Váha</div><div class="dval">${c.vaha?c.vaha+' kg':'—'}</div></div>
      <div class="dbox"><div class="dlbl">Hĺbka</div><div class="dval">${c.hlbka?c.hlbka+' m':'—'}</div></div>
      <div class="dbox"><div class="dlbl">Počasie</div><div class="dval">${c.pocasie||'—'}</div></div>
      <div class="dbox"><div class="dlbl">Teplota</div><div class="dval">${c.teplota?c.teplota+'°C':'—'}</div></div>
      <div class="dbox"><div class="dlbl">Tlak</div><div class="dval">${c.tlak?c.tlak+' hPa':'—'}</div></div>
    </div>
    ${c.komentar?`<div style="background:#162647;border-radius:8px;padding:12px;margin-bottom:12px;font-size:14px;">${c.komentar}</div>`:''}
    ${c.lat?`<a href="https://maps.google.com/?q=${c.lat},${c.lng}" target="_blank" style="display:block;background:#1a2f52;border:1px solid rgba(79,195,247,0.15);border-radius:10px;padding:12px;text-align:center;color:#4fc3f7;text-decoration:none;margin-bottom:10px;font-weight:600;">🗺️ Otvoriť v Google Maps</a>`:''}
    <div class="surl">${shareUrl}</div>
    <button class="btn btn-s" onclick="navigator.clipboard.writeText('${shareUrl}').then(()=>toast('Link skopírovaný! 📋'))">📋 Kopírovať link</button>`;
  openModal('modal-detail');
}

function openRevir(revir){
  const cs=catches.filter(c=>c.revir===revir);
  document.getElementById('r-title').textContent=revir;
  const maxW=cs.reduce((m,c)=>Math.max(m,parseFloat(c.vaha)||0),0);
  const baitMap={};cs.forEach(c=>{if(c.nastraha)baitMap[c.nastraha]=(baitMap[c.nastraha]||0)+1;});
  const baits=Object.entries(baitMap).sort((a,b)=>b[1]-a[1]);
  const maxB=baits[0]?.[1]||1;
  document.getElementById('r-body').innerHTML=`
    <div class="sgrid" style="margin-bottom:16px">
      <div class="sbox"><div class="sval">${cs.length}</div><div class="slbl">Úlovkov</div></div>
      <div class="sbox"><div class="sval">${maxW.toFixed(1)}</div><div class="slbl">kg max</div></div>
    </div>
    ${baits.length?`<div class="stitle">Nástrahy</div>${baits.map(([b,n])=>`<div class="brow"><div class="blbl">${b}</div><div class="bwrap"><div class="bfill" style="width:${(n/maxB)*100}%"></div></div><div class="bn">${n}</div></div>`).join('')}`:''}
    <div class="stitle">História</div>
    ${cs.map(c=>`
      <div class="card" onclick="closeModal('modal-revir');setTimeout(()=>openDetail('${c.id}'),200)">
        <div class="card-body">
          <div class="card-row"><div class="card-name">${c.ryba}</div><div class="card-date">${c.datum}</div></div>
          <div class="tags">
            ${c.dlzka?`<span class="tag tag-b">📏 ${c.dlzka} cm</span>`:''}
            ${c.vaha?`<span class="tag tag-g">⚖️ ${c.vaha} kg</span>`:''}
            ${c.nastraha?`<span class="tag">🪱 ${c.nastraha}</span>`:''}
          </div>
        </div>
      </div>`).join('')}`;
  openModal('modal-revir');
}

function openAdd(){
  ['f-fish','f-type','f-revir','f-bait','f-length','f-weight','f-depth','f-comment'].forEach(id=>document.getElementById(id).value='');
  photos={};lat=null;lng=null;weather=null;
  ['sl-fish','sl-bait','sl-place'].forEach(id=>{const img=document.getElementById(id).querySelector('img');if(img)img.remove();});
  document.getElementById('wbox').innerHTML='<div class="wi">Načítavam GPS...</div>';
  openModal('modal-add');
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(pos=>{
      lat=pos.coords.latitude;lng=pos.coords.longitude;
      fetchWeather(lat,lng);
    },()=>{document.getElementById('wbox').innerHTML='<div class="wi">GPS nedostupná</div>';});
  }
}

function showTab(id,btn){
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  btn.classList.add('active');
}

function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.modal-bg').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');}));
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function loader(show){document.getElementById('loader').classList.toggle('show',show);}

// Pred tým ako spustíme appku, treba nastaviť Supabase Storage bucket
// Spustíme appku
boot();
</script>
</body>
</html>
